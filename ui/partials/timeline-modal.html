<!--
  Main-page multi-pattern timeline modal.

  Owns its own ID namespace (`mp-tl-*`, `mp-timeline-*`) so it can coexist with
  the progression-page timeline modal - both pages can render at the same time
  in dev tooling. The grid is dynamic-N (1..64 rows) rather than the fixed
  4-row progression grid; row colors are generated by the renderer via a
  golden-angle HSL walk so every card retains a stable hue.

  Close button, LOOPS input, duration display, FILL presets, CLEAR and the
  scroll region mirror the progression chrome so the two pages feel the same.
-->
<div id="mp-timeline-modal" class="fixed inset-0 z-[100] hidden">
  <div class="absolute inset-0 bg-black/70" id="mp-timeline-backdrop"></div>
  <div class="absolute inset-8 bg-surface-container-low rounded-2xl border-2 border-surface-container-highest shadow-2xl flex flex-col overflow-hidden">
    <!-- Modal Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-surface-container">
      <div class="flex items-center gap-6">
        <span class="text-lg font-black text-primary-fixed tracking-widest">PATTERN TIMELINE</span>
        <div class="flex items-center gap-2">
          <label class="text-[0.9rem] font-black text-on-surface-variant">LOOPS</label>
          <input id="mp-timeline-loops" type="number" min="1" max="128" value="16"
                 class="w-16 h-8 bg-surface-container-lowest text-primary-fixed text-xs font-mono text-center border-none ring-1 ring-surface-container-highest focus:ring-primary-fixed rounded-lg"/>
        </div>
        <span id="mp-timeline-duration" class="text-[0.9rem] font-mono text-on-surface-variant opacity-60"></span>
        <span id="mp-timeline-mode-pill" class="hidden px-2 py-0.5 rounded-full bg-green-600 text-white text-[0.7rem] font-black tracking-widest">CHECKBOXED MODE</span>
      </div>
      <button id="btn-mp-timeline-close" class="td3-toolbar-btn td3-toolbar-btn--neutral td3-toolbar-btn--icon tactile-button">
        <span class="material-symbols-outlined text-lg">close</span>
      </button>
    </div>
    <!-- Timeline Grid - vertically centered so the rows sit in the middle
         of the scroll viewport. Horizontally scrollable along columns. -->
    <div class="flex-1 overflow-auto px-6 py-4 flex items-start" id="mp-timeline-scroll">
      <div id="mp-timeline-grid" class="inline-flex flex-col gap-0">
        <!-- Rendered by JS -->
      </div>
    </div>
    <!-- Quick Fill Dropdown - opens upward (bottom-full). Same `group` hover
         trick as progression so the panel stays open while the cursor is on
         either the button or the panel. CHECKED-ONLY and FOCUSED-ONLY
         presets short-list the selection set (Reading X). -->
    <div class="flex items-center gap-2 px-6 py-3 border-t border-surface-container">
      <div class="relative group">
        <button id="mp-tl-fill" class="td3-toolbar-btn td3-toolbar-btn--neutral tactile-button">
          FILL <span class="material-symbols-outlined text-sm">arrow_drop_up</span>
        </button>
        <div class="absolute left-0 bottom-full mb-1 hidden group-hover:block z-50 min-w-[16rem] p-2 rounded-lg bg-surface-container-highest shadow-xl border border-outline-variant">
          <button type="button" data-mp-fill="sequence" class="td3-toolbar-btn td3-toolbar-btn--neutral td3-toolbar-btn--menu tactile-button" title="1..N repeating across the timeline">FILL SEQUENCE (1..N)</button>
          <button type="button" data-mp-fill="checked"  class="td3-toolbar-btn td3-toolbar-btn--neutral td3-toolbar-btn--menu tactile-button" title="Repeat the checked patterns in index order">FILL CHECKED</button>
          <button type="button" data-mp-fill="focused"  class="td3-toolbar-btn td3-toolbar-btn--neutral td3-toolbar-btn--menu tactile-button" title="Fill every slot with the focused pattern">FILL FOCUSED</button>
          <div class="h-px bg-outline-variant opacity-40 my-1"></div>
          <button type="button" data-mp-fill="random"   class="td3-toolbar-btn td3-toolbar-btn--neutral td3-toolbar-btn--menu tactile-button" title="Random pattern at each column">RANDOMIZE</button>
        </div>
      </div>
      <button id="mp-tl-clear" class="td3-toolbar-btn td3-toolbar-btn--neutral tactile-button">CLEAR</button>
    </div>
  </div>
</div>
